name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/EqFlex.App/EqFlex.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish

      - name: Download previous releases for delta packages
        run: >
          vpk download github
          --repoUrl https://github.com/louie1214/eq-flex
          --token ${{ secrets.GITHUB_TOKEN }}
          --releaseDir releases
        continue-on-error: true

      - name: Pack
        run: >
          vpk pack
          --packId EqFlex
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --releaseDir releases
          --mainExe EqFlex.App.exe
          --icon src/EqFlex.App/Resources/eq-flex.ico
          --releaseNotes CHANGES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: EQ Flex ${{ github.ref_name }}
          body_path: CHANGES.md
          files: releases/*
